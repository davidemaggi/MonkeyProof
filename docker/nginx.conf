server {
  listen 8080;
  server_name _;
  absolute_redirect off;
  port_in_redirect off;

  root /usr/share/nginx/html;
  index index.html;

  # Never serve stale HTML after a release.
  location ~* \.html$ {
    expires -1;
    add_header Cache-Control "no-cache, must-revalidate";
    try_files $uri =404;
  }

  # Astro build artifacts are content-hashed and safe to cache aggressively.
  location /_astro/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Public assets are not always content-hashed: cache but revalidate.
  location ~* \.(?:css|js|mjs|map|jpg|jpeg|gif|png|svg|ico|webp|avif|woff2?|mp3)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=0, must-revalidate";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/index.html =404;
  }
}
